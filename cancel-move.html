<script type="text/javascript">
    RED.nodes.registerType('cancel-move', {
        category: 'AMR Control',
        color: '#F8BBD0',
        defaults: {
            name: { value: "" },
            robot_ip: { value: "192.168.192.5", required: true },
            timeout: { value: 5, required: true, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 2,
        outputLabels: [
            "Success",
            "Error"
        ],
        icon: "font-awesome/fa-stop-circle",
        label: function () {
            return this.name || "Cancel Move";
        }
    });
</script>

<script type="text/html" data-template-name="cancel-move">
    <div class="form-row">
        <label for="node-input-name">
            <i class="fa fa-tag"></i> Name
        </label>
        <input type="text" id="node-input-name" placeholder="Cancel Move">
    </div>

    <div class="form-row">
        <label for="node-input-robot_ip">
            <i class="fa fa-wifi"></i> Robot IP
        </label>
        <input type="text" id="node-input-robot_ip" placeholder="192.168.192.5">
    </div>

    <div class="form-row">
        <label for="node-input-timeout">
            <i class="fa fa-clock-o"></i> Timeout
        </label>
        <input type="number" id="node-input-timeout" placeholder="5">
    </div>
</script>

<script type="text/html" data-help-name="cancel-move">
    <p>Cancel current AMR movement task.</p>

    <h3>Outputs</h3>
    <ol>
        <li>Success</li>
        <li>Error</li>
    </ol>
</script>
