<script type="text/javascript">
    RED.nodes.registerType('current-poi', {
        category: 'AMR Status',
        color: '#BBDEFB',
        defaults: {
            name: { value: "" },
            robot_ip: { value: "192.168.192.5", required: true },
            timeout: { value: 5, required: true, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 2,
        outputLabels: ["Data", "Error"],
        icon: "font-awesome/fa-map-marker",
        label: function () {
            return this.name || "Current POI";
        }
    });
</script>

<script type="text/html" data-template-name="current-poi">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Current POI">
    </div>

    <div class="form-row">
        <label for="node-input-robot_ip"><i class="fa fa-wifi"></i> Robot IP</label>
        <input type="text" id="node-input-robot_ip" placeholder="192.168.192.5">
    </div>

    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Timeout</label>
        <input type="number" id="node-input-timeout" placeholder="5">
    </div>
</script>

<script type="text/html" data-help-name="current-poi">
    <p>Read current AMR POI once when triggered.</p>
    <p>Output example: POI, LPOI, x, y, angle.</p>
</script>
